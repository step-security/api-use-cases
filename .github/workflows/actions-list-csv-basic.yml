name: List Workflow Actions

on:
  workflow_dispatch:
    inputs:
      tenant:
        description: 'StepSecurity tenant name'
        required: true
        type: string
      org:
        description: 'GitHub organization name (leave empty for all orgs)'
        required: false
        type: string

permissions: {}

jobs:
  list-workflow-actions-basic:
    permissions:
      contents: read  
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Make script executable
        run: chmod +x scripts/list_workflow_actions.sh

      - name: List workflow actions
        run: |
          ARGS="--tenant ${{ inputs.tenant }} --token ${{ secrets.API_KEY }} --output workflow_actions.csv"
          if [[ -n "${{ inputs.org }}" ]]; then
            ARGS="$ARGS --org ${{ inputs.org }}"
          fi
          ./scripts/list_workflow_actions.sh $ARGS

      - name: Upload results as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: workflow-actions-${{ inputs.tenant }}
          path: workflow_actions.csv
          retention-days: 30
